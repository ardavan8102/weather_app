name: weather_app
description: "Weather Application"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  cupertino_icons: ^1.0.2
  intl: ^0.19.0
  get: ^4.6.6
  url_launcher: ^6.2.6
  iconsax: ^0.0.8
  weather: ^3.1.1
  geolocator: ^11.0.0
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # - - - - - -  LOCAL ASSETS - - - - - - #
  assets:
    - assets/
    - assets/animations/
    - assets/icons/
  
  # - - - - - -  LOCAL FONTS - - - - - - #
  fonts:
    - family: reem
      fonts:
        - asset: assets/fonts/Reem.ttf
          weight: 500
